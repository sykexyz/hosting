kind = "web"
previewPath = "/"
title = "1999 Bot Hosting"
version = "1.0.0"
id = "artifacts/bot-hosting"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24722

[services.development]
run = "pnpm --filter @workspace/bot-hosting run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bot-hosting", "run", "build" ]
serve = "static"
publicDir = "artifacts/bot-hosting/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24722"
BASE_PATH = "/"
